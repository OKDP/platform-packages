{{- $root := . -}}
{{- $secretsByName := dict -}}
{{- range .Values.secrets }}
  {{- if not .name }}
    {{- fail "each secrets entry must define name" -}}
  {{- end }}
  {{- $entry := (get $secretsByName .name | default (dict "name" .name)) -}}
  {{- range $k, $v := omit . "name" "description" }}
    {{- $_ := set $entry $k $v -}}
  {{- end }}
  {{- if hasKey . "description" }}
    {{- $_ := set $entry "description" .description -}}
  {{- end }}
  {{- $_ := set $secretsByName .name $entry -}}
{{- end }}
{{- range $secretName := (keys $secretsByName | sortAlpha) }}
  {{- $secret := index $secretsByName $secretName -}}
  {{- $secretData := omit $secret "name" "description" -}}
  {{- $dataKeys := keys $secretData | sortAlpha -}}
  {{- $autoKeys := list -}}
  {{- range $k := $dataKeys }}
    {{- if eq (index $secretData $k) "" }}
      {{- $autoKeys = append $autoKeys $k -}}
    {{- end }}
  {{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secret.name }}
  labels:
    {{- include "local-secrets-provider.labels" $root | nindent 4 }}
  annotations:
    replicator.v1.mittwald.de/replicate-to: "*"
    {{- if $autoKeys }}
    secret-generator.v1.mittwald.de/autogenerate: "{{ join "," $autoKeys }}"
    {{- end }}
type: Opaque
stringData:
  {{- range $k := $dataKeys }}
  {{ $k }}: {{ index $secretData $k | quote }}
  {{- end }}
---
{{- end }}
